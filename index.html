<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/logo-light.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#E8573F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kokoro" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kokoro — Portal</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("kokoro-theme");
          var theme =
            stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var dark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
